version: "3.9"
services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: murad
      MYSQL_PASSWORD: 123

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
  backend:
    build: .
    container_name: backend_app
    restart: always

    ports:
      - "3000:3000"

    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/assignment
    command: npm run dev